<div class="site-intro">
  <a href="/">
    {% if site.data.theme.social.gravatar %}
    <img src="https://www.gravatar.com/avatar/{{ site.data.theme.social.gravatar }}?s=160" id="gravatar" class="site-avatar" alt="My photo"/>
    {% else %}
    <img src="/logo.png" id="logo" class="site-avatar" alt="Blog logo"/>
    {% endif %}
  </a>

  <div>
    <h1><a href="/">{{ site.data.theme.name }}</a></h1>
    <p class="site-tagline">{{ site.description }}</p>
  </div>
</div>

<nav class="site-nav" aria-label="Primary navigation">
  <a href="/">Posts</a>
  <a href="/about/">About</a>
  <a href="/atom.xml">Feed</a>
</nav>

<aside class="site-bio">
  <div id="bio">
    <p>A software developer in Canada primarily interested in game development, web applications, scalable servers, and clean code design.</p>
  </div>

  <div id="social">
    {% include social.html %}
  </div>
</aside>
